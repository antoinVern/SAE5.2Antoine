<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratoire Éphémère - Console</title>
    <style>
        :root {
            --bg: #f4f5f8;
            --panel: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #2563eb;
            --primary-soft: #e0e7ff;
            --danger: #dc2626;
            --success: #15803d;
            --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 28px 18px 48px;
        }
        .shell {
            max-width: 1180px;
            margin: 0 auto;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 80%);
            display: grid;
            place-items: center;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.4px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 700;
        }
        .subtitle { color: var(--muted); font-size: 0.95rem; }
        .badge {
            padding: 8px 12px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--muted);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .badge .status {
            display: inline-block;
            margin-left: 8px;
            padding: 6px 8px;
            background: transparent;
            border: none;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px;
            box-shadow: 0 14px 32px rgba(17, 24, 39, 0.04);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .panel h2 {
            font-size: 1.05rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }
        button {
            border: 1px solid transparent;
            background: var(--panel);
            color: var(--text);
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            transition: all 0.18s ease;
        }
        button:hover { border-color: var(--border); transform: translateY(-1px); }
        .primary { background: var(--primary); color: #fff; }
        .primary:hover { border-color: var(--primary); }
        .ghost { background: #f8fafc; }
        .danger { background: #fef2f2; color: var(--danger); border-color: #fecdd3; }
        .status {
            padding: 10px 12px;
            border-radius: 10px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: #f8fafc;
        }
        .status.running { color: var(--success); border-color: #bbf7d0; background: #f0fdf4; }
        .status.stopped { color: var(--danger); border-color: #fecdd3; background: #fef2f2; }
        .list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 260px;
            overflow-y: auto;
        }
        .device {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            background: #f8fafc;
        }
        .device strong { color: var(--primary); }
        .muted { color: var(--muted); font-size: 0.92rem; }
        .logs {
            font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
            font-size: 0.9rem;
            background: #0b1021;
            color: #c9d1d9;
            border-radius: 10px;
            padding: 12px;
            min-height: 120px;
            max-height: 220px;
            overflow-y: auto;
        }
        .inline-status {
            display: grid;
            gap: 8px;
        }
        @media (max-width: 720px) {
            header { flex-direction: column; align-items: flex-start; }
            .section-actions { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <header>
            <div class="brand">
                <div class="brand-mark">LE</div>
                <div>
                    <h1>Laboratoire Éphémère</h1>
                    <div class="subtitle">Console de contrôle</div>
                </div>
            </div>
            <div class="badge">État général : <span id="control-status" class="status stopped">Arrêté</span></div>
        </header>

        <div class="grid">
            <section class="panel">
                <h2>Contrôle du labo</h2>
                <div class="section-actions">
                    <button class="primary" onclick="startLab()">Démarrer</button>
                    <button class="ghost" onclick="stopLab()">Arrêter</button>
                    <button class="ghost" onclick="restartLab()">Redémarrer</button>
                    <button class="danger" onclick="destroyLab()">Supprimer le labo</button>
                </div>
            </section>

            <section class="panel">
                <h2>Découverte réseau</h2>
                <button class="ghost" onclick="scanNetwork()">Lancer un scan</button>
                <div id="network-status" class="muted">En attente…</div>
                <div id="device-list" class="list"></div>
            </section>

            <section class="panel">
                <h2>Services</h2>
                <div id="services-status" class="inline-status">
                    <div class="muted">Chargement…</div>
                </div>
            </section>

            <section class="panel">
                <h2>Logs récents</h2>
                <div style="display:flex; gap:10px; align-items:center;">
                    <button class="ghost" onclick="refreshLogs()">Actualiser</button>
                    <span class="muted">Mises à jour automatiques toutes les 15s</span>
                </div>
                <div id="logs" class="logs">Aucun log disponible</div>
            </section>
        </div>
    </div>

<script>
async function fetchJsonOrThrow(url, options) {
    const res = await fetch(url, options);
    const ct = res.headers.get('content-type') || '';
    if (!ct.includes('application/json')) {
        const txt = await res.text();
        throw new Error(`Réponse non-JSON (${res.status}) : ${txt.slice(0, 200)}`);
    }
    const data = await res.json();
    if (!res.ok) {
        throw new Error(data.message || `Erreur HTTP ${res.status}`);
    }
    return data;
}

function updateStatus(elementId, status, message) {
    const element = document.getElementById(elementId);
    element.className = `status ${status}`;
    element.textContent = message;
}

async function startLab() {
    try {
        const data = await fetchJsonOrThrow('/api/control/start', { method: 'POST' });
        updateStatus('control-status', data.status === 'running' ? 'running' : 'stopped', data.message);
    } catch (e) {
        alert('Erreur: ' + e.message);
    }
}

async function stopLab() {
    try {
        const data = await fetchJsonOrThrow('/api/control/stop', { method: 'POST' });
        updateStatus('control-status', 'stopped', data.message);
    } catch (e) {
        alert('Erreur: ' + e.message);
    }
}

async function restartLab() {
    try {
        const data = await fetchJsonOrThrow('/api/control/restart', { method: 'POST' });
        updateStatus('control-status', 'running', data.message);
    } catch (e) {
        alert('Erreur: ' + e.message);
    }
}

async function destroyLab() {
    if (!confirm('⚠️ Êtes-vous sûr de vouloir détruire le laboratoire ? Cette action est irréversible.')) return;
    try {
        const data = await fetchJsonOrThrow('/api/control/destroy', { method: 'POST' });
        alert(data.message);
        updateStatus('control-status', 'stopped', 'Laboratoire détruit');
    } catch (e) {
        alert('Erreur: ' + e.message);
    }
}

async function scanNetwork() {
    const statusDiv = document.getElementById('network-status');
    const deviceList = document.getElementById('device-list');

    statusDiv.innerHTML = '<div class="loading">🔍 Scan en cours...</div>';
    deviceList.innerHTML = '';

    try {
        const data = await fetchJsonOrThrow('/scanner/api/discover', { method: 'GET' });
        statusDiv.innerHTML = `<div class="status running">${data.count} machine(s) trouvée(s) sur ${data.network}</div>`;

        if (data.devices && data.devices.length > 0) {
            deviceList.innerHTML = data.devices.map(device => `
                <div class="device-item">
                    <strong>IP:</strong> ${device.ip || 'N/A'}<br>
                    ${device.hostname ? `<strong>Hostname:</strong> ${device.hostname}<br>` : ''}
                    ${device.mac ? `<strong>MAC:</strong> ${device.mac}<br>` : ''}
                    ${device.vendor ? `<strong>Vendor:</strong> ${device.vendor}` : ''}
                </div>
            `).join('');
        } else {
            deviceList.innerHTML = '<div class="status stopped">Aucune machine trouvée</div>';
        }
    } catch (e) {
        statusDiv.innerHTML = `<div class="status stopped">Erreur: ${e.message}</div>`;
    }
}

async function refreshLogs() {
    const logsDiv = document.getElementById('logs');
    logsDiv.innerHTML = 'Chargement des logs...';
    try {
        const data = await fetchJsonOrThrow('/api/logs', { method: 'GET' });
        logsDiv.textContent = data.logs || 'Aucun log disponible';
    } catch (e) {
        logsDiv.textContent = 'Erreur: ' + e.message;
    }
}

async function checkServices() {
    const servicesDiv = document.getElementById('services-status');
    const services = [
        { name: 'Web UI', url: '/' },
        { name: 'Network Scanner', url: '/scanner/' },
        { name: 'Target Web', url: 'http://localhost:8080/' },
        { name: 'Target API', url: 'http://localhost:5000/' }
    ];

    let html = '';
    for (const s of services) {
        try {
            await fetch(s.url, { method: 'GET' });
            html += `<div class="status running">✅ ${s.name}</div>`;
        } catch {
            html += `<div class="status stopped">❌ ${s.name}</div>`;
        }
    }
    servicesDiv.innerHTML = html;
}

setInterval(checkServices, 10000);
setInterval(refreshLogs, 15000);

window.onload = function() {
    scanNetwork();
    checkServices();
    refreshLogs();
};
</script>
</body>
</html>
