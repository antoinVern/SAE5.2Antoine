<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratoire Éphémère - Contrôle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5em; margin-bottom: 10px; }
        .header p { font-size: 1.1em; opacity: 0.9; }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .card h2 { color: #667eea; margin-bottom: 15px; font-size: 1.5em; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            width: 100%;
            margin: 5px 0;
            transition: opacity 0.3s ease;
        }
        .btn:hover { opacity: 0.9; }
        .btn-danger { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .btn-success { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .status { padding: 10px; border-radius: 8px; margin: 10px 0; font-weight: bold; }
        .status.running { background: #d4edda; color: #155724; }
        .status.stopped { background: #f8d7da; color: #721c24; }
        .device-list { max-height: 300px; overflow-y: auto; margin-top: 15px; }
        .device-item {
            background: #f8f9fa;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        .device-item strong { color: #667eea; }
        .loading { text-align: center; padding: 20px; color: #667eea; }
        .log-container {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔬 Laboratoire Éphémère</h1>
        <p>Contrôle et gestion du laboratoire de test</p>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>⚙️ Contrôle</h2>
            <button class="btn btn-success" onclick="startLab()">▶️ Démarrer le laboratoire</button>
            <button class="btn" onclick="stopLab()">⏸️ Arrêter le laboratoire</button>
            <button class="btn" onclick="restartLab()">🔄 Redémarrer le laboratoire</button>
            <button class="btn btn-danger" onclick="destroyLab()">🗑️ Détruire le laboratoire</button>
            <div id="control-status" class="status stopped">Arrêté</div>
        </div>

        <div class="card">
            <h2>🌐 Découverte Réseau</h2>
            <button class="btn" onclick="scanNetwork()">🔍 Scanner le réseau</button>
            <div id="network-status" class="loading">En attente...</div>
            <div id="device-list" class="device-list"></div>
        </div>

        <div class="card">
            <h2>📊 État des Services</h2>
            <div id="services-status"><div class="loading">Chargement...</div></div>
        </div>

        <div class="card">
            <h2>📝 Logs</h2>
            <button class="btn" onclick="refreshLogs()">🔄 Actualiser les logs</button>
            <div id="logs" class="log-container">Aucun log disponible</div>
        </div>
    </div>
</div>

<script>
async function fetchJsonOrThrow(url, options) {
    const res = await fetch(url, options);
    const ct = res.headers.get('content-type') || '';
    if (!ct.includes('application/json')) {
        const txt = await res.text();
        throw new Error(`Réponse non-JSON (${res.status}) : ${txt.slice(0, 200)}`);
    }
    const data = await res.json();
    if (!res.ok) {
        throw new Error(data.message || `Erreur HTTP ${res.status}`);
    }
    return data;
}

function updateStatus(elementId, status, message) {
    const element = document.getElementById(elementId);
    element.className = `status ${status}`;
    element.textContent = message;
}

async function startLab() {
    try {
        const data = await fetchJsonOrThrow('/api/control/start', { method: 'POST' });
        updateStatus('control-status', data.status === 'running' ? 'running' : 'stopped', data.message);
    } catch (e) {
        alert('Erreur: ' + e.message);
    }
}

async function stopLab() {
    try {
        const data = await fetchJsonOrThrow('/api/control/stop', { method: 'POST' });
        updateStatus('control-status', 'stopped', data.message);
    } catch (e) {
        alert('Erreur: ' + e.message);
    }
}

async function restartLab() {
    try {
        const data = await fetchJsonOrThrow('/api/control/restart', { method: 'POST' });
        updateStatus('control-status', 'running', data.message);
    } catch (e) {
        alert('Erreur: ' + e.message);
    }
}

async function destroyLab() {
    if (!confirm('⚠️ Êtes-vous sûr de vouloir détruire le laboratoire ? Cette action est irréversible.')) return;
    try {
        const data = await fetchJsonOrThrow('/api/control/destroy', { method: 'POST' });
        alert(data.message);
        updateStatus('control-status', 'stopped', 'Laboratoire détruit');
    } catch (e) {
        alert('Erreur: ' + e.message);
    }
}

async function scanNetwork() {
    const statusDiv = document.getElementById('network-status');
    const deviceList = document.getElementById('device-list');

    statusDiv.innerHTML = '<div class="loading">🔍 Scan en cours...</div>';
    deviceList.innerHTML = '';

    try {
        const data = await fetchJsonOrThrow('/scanner/api/discover', { method: 'GET' });
        statusDiv.innerHTML = `<div class="status running">${data.count} machine(s) trouvée(s) sur ${data.network}</div>`;

        if (data.devices && data.devices.length > 0) {
            deviceList.innerHTML = data.devices.map(device => `
                <div class="device-item">
                    <strong>IP:</strong> ${device.ip || 'N/A'}<br>
                    ${device.hostname ? `<strong>Hostname:</strong> ${device.hostname}<br>` : ''}
                    ${device.mac ? `<strong>MAC:</strong> ${device.mac}<br>` : ''}
                    ${device.vendor ? `<strong>Vendor:</strong> ${device.vendor}` : ''}
                </div>
            `).join('');
        } else {
            deviceList.innerHTML = '<div class="status stopped">Aucune machine trouvée</div>';
        }
    } catch (e) {
        statusDiv.innerHTML = `<div class="status stopped">Erreur: ${e.message}</div>`;
    }
}

async function refreshLogs() {
    const logsDiv = document.getElementById('logs');
    logsDiv.innerHTML = 'Chargement des logs...';
    try {
        const data = await fetchJsonOrThrow('/api/logs', { method: 'GET' });
        logsDiv.textContent = data.logs || 'Aucun log disponible';
    } catch (e) {
        logsDiv.textContent = 'Erreur: ' + e.message;
    }
}

async function checkServices() {
    const servicesDiv = document.getElementById('services-status');
    const services = [
        { name: 'Web UI', url: '/' },
        { name: 'Network Scanner', url: '/scanner/' },
        { name: 'Target Web', url: 'http://localhost:8080/' },
        { name: 'Target API', url: 'http://localhost:5000/' }
    ];

    let html = '';
    for (const s of services) {
        try {
            await fetch(s.url, { method: 'GET' });
            html += `<div class="status running">✅ ${s.name}</div>`;
        } catch {
            html += `<div class="status stopped">❌ ${s.name}</div>`;
        }
    }
    servicesDiv.innerHTML = html;
}

setInterval(checkServices, 10000);
setInterval(refreshLogs, 15000);

window.onload = function() {
    scanNetwork();
    checkServices();
    refreshLogs();
};
</script>
</body>
</html>
