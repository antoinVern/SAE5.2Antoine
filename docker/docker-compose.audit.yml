version: '3.8'

services:
  # Conteneur Nmap pour scans de ports
  nmap_scanner:
    image: instrumentisto/nmap:latest
    container_name: nmap_scanner
    network_mode: host
    volumes:
      - /opt/audit/reports:/reports
      - /opt/audit/scripts:/scripts
    environment:
      - TZ=Europe/Paris
    # Le conteneur sera lancé à la demande via Ansible/scripts
    profiles:
      - scan

  # Conteneur pour consolidation des rapports (Python)
  report_consolidator:
    image: python:3.11-slim
    container_name: report_consolidator
    volumes:
      - /opt/audit/reports:/reports
      - /opt/audit/scripts:/scripts
    working_dir: /scripts
    command: python3 /scripts/consolidate_reports.py
    profiles:
      - consolidate

  # Service web léger pour visualiser les rapports (optionnel)
  report_viewer:
    image: nginx:alpine
    container_name: report_viewer
    ports:
      - "8081:80"
    volumes:
      - /opt/audit/reports:/usr/share/nginx/html/reports:ro
      - /opt/audit/scripts/nginx_reports.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - viewer
