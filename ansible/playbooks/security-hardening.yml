---
- name: Durcissement de la sécurité
  hosts: targets
  become: yes

  tasks:
    - name: Installer fail2ban
      apt:
        name: fail2ban
        state: present

    - name: Configurer fail2ban
      copy:
        content: |
          [DEFAULT]
          bantime = 3600
          findtime = 600
          maxretry = 5
          destemail = admin@lab.local
          sendername = Fail2Ban
          action = %(action_)s

          [sshd]
          enabled = true
          port = 22
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3
        dest: /etc/fail2ban/jail.local
        mode: '0644'
      notify: restart fail2ban

    - name: Activer fail2ban
      systemd:
        name: fail2ban
        enabled: yes
        state: started

    - name: Configurer les limites de connexion
      pam_limits:
        domain: '*'
        limit_type: hard
        limit_item: nofile
        value: '65536'

    - name: Désactiver les services inutiles
      systemd:
        name: "{{ item }}"
        enabled: no
        state: stopped
      loop:
        - bluetooth
        - cups
        - avahi-daemon

    - name: Configurer les mises à jour automatiques de sécurité
      apt:
        name: unattended-upgrades
        state: present

    - name: Configurer unattended-upgrades
      copy:
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";
          APT::Periodic::AutocleanInterval "7";
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        mode: '0644'

  handlers:
    - name: restart fail2ban
      systemd:
        name: fail2ban
        state: restarted
