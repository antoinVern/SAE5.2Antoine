---
- name: Créer le dossier de rapports (si besoin)
  file:
    path: "{{ nmap_reports_dir }}"
    state: directory
    mode: "0755"

- name: Lancer un scan Nmap depuis un conteneur Docker (sorties dans /opt/audit/reports)
  community.docker.docker_container:
    name: nmap_runner
    image: instrumentisto/nmap:latest
    state: started
    auto_remove: true
    network_mode: host
    volumes:
      - "{{ nmap_reports_dir }}:/reports"
    command: >
      -sS -p {{ nmap_ports }} {{ nmap_target }}
      -oN /reports/{{ nmap_report_basename }}.txt
      -oX /reports/{{ nmap_report_basename }}.xml

- name: Vérifier que le rapport texte existe
  stat:
    path: "{{ nmap_reports_dir }}/{{ nmap_report_basename }}.txt"
  register: report_txt

- name: Échouer si le rapport n'a pas été généré
  fail:
    msg: "Le scan Nmap n'a pas généré de rapport dans {{ nmap_reports_dir }}"
  when: not report_txt.stat.exists
