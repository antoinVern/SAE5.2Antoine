---
# Rôle : Déploiement application cible (nginx en conteneur)

- name: Installer dépendances Python pour community.docker
  ansible.builtin.apt:
    name:
      - python3-pip
    state: present
    update_cache: yes

- name: Installer SDK Docker (python)
  ansible.builtin.pip:
    name: docker
    state: present

- name: Créer le dossier de rapports
  ansible.builtin.file:
    path: /opt/audit/reports
    state: directory
    mode: '0755'

- name: Lancer le conteneur cible nginx
  community.docker.docker_container:
    name: cible_nginx
    image: nginx:stable
    state: started
    recreate: true
    published_ports:
      - "80:80"
    volumes:
      - /opt/audit/reports:/reports

- name: Attendre que nginx soit disponible
  ansible.builtin.uri:
    url: "http://localhost:80"
    status_code: 200
  register: nginx_status
  retries: 10
  delay: 2
  until: nginx_status.status == 200
