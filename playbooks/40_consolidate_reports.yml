---
- name: Consolider les rapports d'audit avec Docker Compose
  hosts: vm_attaquant
  become: true

  vars:
    reports_dir: /opt/audit/reports
    scripts_dir: /opt/audit/scripts

  tasks:
    - name: Vérifier que le répertoire de rapports existe
      ansible.builtin.stat:
        path: "{{ reports_dir }}"
      register: reports_dir_stat

    - name: Créer le répertoire de rapports si nécessaire
      ansible.builtin.file:
        path: "{{ reports_dir }}"
        state: directory
        mode: "0755"
      when: not reports_dir_stat.stat.exists

    - name: Créer le répertoire de scripts si nécessaire
      ansible.builtin.file:
        path: "{{ scripts_dir }}"
        state: directory
        mode: "0755"

    - name: Copier le script de consolidation
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../scripts/consolidate_reports.py"
        dest: "{{ scripts_dir }}/consolidate_reports.py"
        mode: "0755"

    - name: Copier docker-compose pour audit
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../docker/docker-compose.audit.yml"
        dest: "{{ scripts_dir }}/docker-compose.audit.yml"
        mode: "0644"

    - name: Lancer la consolidation via Docker Compose
      ansible.builtin.shell: |
        cd {{ scripts_dir }}
        docker-compose -f docker-compose.audit.yml --profile consolidate up --remove-orphans report_consolidator
      environment:
        COMPOSE_FILE: "{{ scripts_dir }}/docker-compose.audit.yml"

    - name: Vérifier que le rapport consolidé a été généré
      ansible.builtin.stat:
        path: "{{ reports_dir }}/audit_consolidated_report.html"
      register: consolidated_report

    - name: Afficher le chemin du rapport consolidé
      ansible.builtin.debug:
        msg: "✅ Rapport consolidé disponible: {{ reports_dir }}/audit_consolidated_report.html"
