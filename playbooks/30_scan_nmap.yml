---
- name: Découverte automatique des hôtes et scan rapide (démo)
  hosts: vm_attaquant
  become: true

  vars:
    reports_dir: /opt/audit/reports
    subnets:
      - "10.10.10.0/24"   # LAN
      - "10.10.20.0/24"   # DMZ

  tasks:
    - name: Créer le dossier de rapports
      ansible.builtin.file:
        path: "{{ reports_dir }}"
        state: directory
        mode: "0755"

    - name: Nettoyer anciens rapports de démo (optionnel)
      ansible.builtin.shell: |
        rm -f {{ reports_dir }}/discovery_*.gnmap {{ reports_dir }}/scan_*.txt {{ reports_dir }}/scan_*.xml {{ reports_dir }}/targets.txt
      changed_when: false

    - name: Découverte des hôtes actifs (ping scan)
      ansible.builtin.shell: |
        docker run --rm --network host -v {{ reports_dir }}:/reports instrumentisto/nmap:latest \
          -sn -n {{ item }} -oG /reports/discovery_{{ item | replace('/','_') }}.gnmap
      loop: "{{ subnets }}"

    - name: Extraire les IP actives détectées
      ansible.builtin.shell: |
        cat {{ reports_dir }}/discovery_*.gnmap \
        | awk '/Up$/{print $2}' \
        | sort -u > {{ reports_dir }}/targets.txt

    - name: Scan rapide des services (22/80/443) pour chaque cible
      ansible.builtin.shell: |
        if [ ! -s {{ reports_dir }}/targets.txt ]; then
          echo "Aucune cible détectée" > {{ reports_dir }}/scan_summary.txt
          exit 0
        fi
        while read -r ip; do
          docker run --rm --network host -v {{ reports_dir }}:/reports instrumentisto/nmap:latest \
            -n -Pn -T4 --open -sS -p 22,80,443 "$ip" \
            -oN "/reports/scan_${ip}.txt" \
            -oX "/reports/scan_${ip}.xml"
        done < {{ reports_dir }}/targets.txt
