---
- name: Déployer une cible nginx en conteneur sur la DMZ
  hosts: vm_cible_dmz
  become: true
  pre_tasks:
    - name: Installer dépendances Python pour community.docker
      ansible.builtin.apt:
        name:
          - python3-pip
        state: present
        update_cache: yes

    - name: Installer SDK Docker (python)
      ansible.builtin.pip:
        name: docker
        state: present

  roles:
    - cible_nginx
