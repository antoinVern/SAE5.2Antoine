services:
  ansible-control:
    image: cytopia/ansible:latest
    container_name: lab-ansible-control
    networks:
      - lab-network
    volumes:
      - ./ansible:/etc/ansible
      - ./scripts:/scripts
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - ANSIBLE_HOST_KEY_CHECKING=False
    command: tail -f /dev/null
    restart: unless-stopped

  target-web:
    image: ubuntu:22.04
    container_name: lab-target-web
    networks:
      - lab-network
    volumes:
      - ./targets/web:/app
    working_dir: /app
    command: /bin/bash -c "apt-get update && apt-get install -y python3 && python3 -m http.server 8080"
    ports:
      - "8080:8080"
    restart: unless-stopped

  target-db:
    image: ubuntu:22.04
    container_name: lab-target-db
    networks:
      - lab-network
    environment:
      - MYSQL_ROOT_PASSWORD=secure_password_123
    command: /bin/bash -c "apt-get update && apt-get install -y mysql-server && service mysql start && tail -f /dev/null"
    ports:
      - "3306:3306"
    restart: unless-stopped

  target-api:
    image: ubuntu:22.04
    container_name: lab-target-api
    networks:
      - lab-network
    volumes:
      - ./targets/api:/app
    command: /bin/bash -c "apt-get update && apt-get install -y python3 python3-pip && pip3 install flask && python3 /app/api.py"
    ports:
      - "5000:5000"
    restart: unless-stopped

  web-ui:
    image: nginx:alpine
    container_name: lab-web-ui
    networks:
      - lab-network
    volumes:
      - ./web-ui:/usr/share/nginx/html
      - ./web-ui/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - control-api
    # IMPORTANT: permet d'accéder à l'hôte (scanner en host mode)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Scanner réseau (HOST MODE)
  network-scanner:
    image: ubuntu:22.04
    container_name: lab-network-scanner
    volumes:
      - ./scripts:/scripts
    command: /bin/bash -c "apt-get update && apt-get install -y nmap python3 python3-pip net-tools && pip3 install flask requests && python3 /scripts/network_scanner.py"
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  # Control API (build)
  control-api:
    build:
      context: .
      dockerfile: scripts/Dockerfile.control-api
    container_name: lab-control-api
    networks:
      - lab-network
    volumes:
      - ./:/project
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PROJECT_DIR=/project
      - COMPOSE_FILE=/project/docker-compose.yml
    ports:
      - "5002:5002"
    restart: unless-stopped

networks:
  lab-network:
    driver: bridge
